name: Daily DB Backup

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create backup folder
        run: mkdir -p backups

      - name: Create dump
        env:
          SUPABASE_DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: |
          test -n "$SUPABASE_DIRECT_URL"
          DATE="$(date +'%Y-%m-%d_%H-%M-%S')"
          FILE="backups/asset-app-back-${DATE}.dump"
          pg_dump \
            --dbname="$SUPABASE_DIRECT_URL" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file="$FILE"
          echo "BACKUP_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
