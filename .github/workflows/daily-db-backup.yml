name: Daily DB Backup

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create backup folder
        run: mkdir -p backups

      - name: Create dump
        env:
          SUPABASE_DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: |
          test -n "$SUPABASE_DIRECT_URL"
          DATE="$(date +'%Y-%m-%d_%H-%M-%S')"
          FILE="backups/asset-app-back-${DATE}.dump"
          docker run --rm \
            -v "${PWD}/backups:/backups" \
            postgres:17 \
            pg_dump \
              --dbname="$SUPABASE_DIRECT_URL" \
              --format=custom \
              --no-owner \
              --no-privileges \
              --file="/backups/asset-app-back-${DATE}.dump"
          echo "BACKUP_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
